name: Run tests

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: allure-publish
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        continue-on-error: true   # publish the report even when tests fail
        env:
          USER_ID: ${{ secrets.USER_ID }}
          HEADLESS: "true"
        run: poetry run pytest

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - uses: actions/setup-java@v4
        if: always()
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Allure report
        if: always()
        run: |
          # carry forward trend history from the previously published report
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history reports/allure-results/history
          fi
          curl -sL -o allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          ./allure-2.27.0/bin/allure generate reports/allure-results -o allure-history --clean

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
